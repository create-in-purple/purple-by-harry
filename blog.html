<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Journal — Purple by Harry</title>
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<meta name="theme-color" content="#050505">
<meta property="og:image" content="images/og-image.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="stylesheet" href="assets/loader.css">
<link rel="stylesheet" href="assets/transition.css">
<script src="assets/sanity.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,300..600&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<style>
:root{--canvas:#050505;--surface-1:#101010;--surface-2:#181818;--hairline:#262626;--ink:#f5f3f4;--ink-muted:#8c868a;--magenta:#ff009d;--magenta-soft:#ff4dbb;--violet:#7a2bff;--pill:100px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--canvas);color:var(--ink);font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.15px}
::selection{background:var(--magenta);color:#fff}
a{color:inherit;text-decoration:none}img{display:block;max-width:100%}
.display{font-family:"Anton",sans-serif;text-transform:uppercase;letter-spacing:-.01em;line-height:.86}
.mono-label{font-size:12px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-muted)}
.pink{color:var(--magenta)}
nav{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:14px clamp(20px,4vw,48px);background:rgba(5,5,5,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--hairline)}
nav .brand{font-family:"Anton";text-transform:uppercase;font-size:19px;display:inline-flex;align-items:center}
nav .brand img{height:26px;width:auto;display:block}
nav .links{display:flex;gap:24px;align-items:center}
nav .links a{font-size:13px;font-weight:500;letter-spacing:.04em;color:var(--ink-muted);transition:color .3s}
nav .links a:hover,nav .links a.active{color:var(--ink)}
header.bl-hero{padding:clamp(46px,7vw,90px) clamp(20px,4vw,48px) clamp(20px,3vw,34px);position:relative;overflow:hidden;border-bottom:1px solid var(--hairline)}
.bl-hero .glow{position:absolute;left:55%;top:-30%;width:60vw;height:60vw;border-radius:50%;filter:blur(120px);opacity:.38;background:radial-gradient(circle,#ff009d,#7a2bff 45%,transparent 70%);pointer-events:none}
.bl-hero .mono-label{margin-bottom:16px;position:relative}
.bl-hero h1{font-size:clamp(48px,10vw,150px);position:relative}
.bl-hero h1 .grad{background:linear-gradient(108deg,#ff009d,#ff8ad4 52%,#7a2bff);-webkit-background-clip:text;background-clip:text;color:transparent}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:clamp(16px,2vw,26px);padding:clamp(28px,3vw,46px) clamp(20px,4vw,48px) clamp(60px,8vw,110px);max-width:1400px;margin:0 auto}
.post{background:var(--surface-1);border:1px solid var(--hairline);border-radius:18px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;opacity:0;transform:translateY(22px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1),border-color .3s}
.post.in{opacity:1;transform:none}
.post:hover{border-color:rgba(255,0,157,.4)}
.post .ph{aspect-ratio:16/10;overflow:hidden;background:#111}
.post .ph img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.16,1,.3,1)}
.post:hover .ph img{transform:scale(1.05)}
.post .body{padding:20px;display:flex;flex-direction:column;gap:9px}
.post .d{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--magenta)}
.post .t{font-family:"Anton";text-transform:uppercase;font-size:24px;line-height:1.02}
.post .ex{color:var(--ink-muted);font-size:14px;line-height:1.55}
.post .more{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
/* reader */
.reader{position:fixed;inset:0;z-index:100;background:var(--canvas);overflow-y:auto;opacity:0;visibility:hidden;transition:opacity .4s}
.reader.open{opacity:1;visibility:visible}
.reader .rd-close{position:fixed;top:18px;right:20px;z-index:2;width:46px;height:46px;border-radius:50%;border:1px solid var(--hairline);background:rgba(16,14,18,.8);backdrop-filter:blur(10px);color:var(--ink);font-size:20px;cursor:pointer;transition:transform .25s,background .3s}
.reader .rd-close:hover{background:var(--magenta);transform:rotate(90deg)}
.rd-cover{height:46vh;min-height:280px;position:relative;overflow:hidden}
.rd-cover img{width:100%;height:100%;object-fit:cover}
.rd-cover::after{content:"";position:absolute;inset:0;background:linear-gradient(transparent 40%,var(--canvas))}
.rd-body{max-width:720px;margin:-80px auto 0;position:relative;padding:0 24px 100px}
.rd-body .d{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--magenta);margin-bottom:14px}
.rd-body h1{font-family:"Anton";text-transform:uppercase;font-size:clamp(34px,5.5vw,68px);line-height:.92;margin-bottom:26px}
.rd-body .rt{font-size:17px;line-height:1.75;color:#d9d4d7}
.rd-body .rt p{margin:0 0 18px}
.rd-body .rt h2,.rd-body .rt h3{font-family:"Anton";text-transform:uppercase;margin:30px 0 12px;letter-spacing:.01em}
.rd-body .rt strong{color:var(--ink)}
.rd-body .rt a{color:var(--magenta);text-decoration:underline}
.rd-body .rt ul,.rd-body .rt ol{margin:0 0 18px 20px}.rd-body .rt li{margin:6px 0}
.rd-body .rt img{border-radius:12px;margin:18px 0}
footer{border-top:1px solid var(--hairline);padding:30px clamp(20px,4vw,48px);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;color:var(--ink-muted);font-size:12px}
footer a:hover{color:var(--magenta)}
@media(max-width:560px){nav .links a:not(.active){display:none}}
</style>
</head>
<body>
<nav>
  <a class="brand" href="index.html" aria-label="Purple by Harry"><img src="images/logo-mark.png" alt="Purple by Harry"></a>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="blog.html" class="active">Journal</a>
    <a href="guide.html">Guide</a>
    <a href="index.html#about">About</a>
  </div>
</nav>

<header class="bl-hero">
  <div class="glow"></div>
  <div class="mono-label">Saigon Purple · Journal</div>
  <h1 class="display">THE <span class="grad">JOURNAL</span></h1>
</header>

<main class="grid" id="grid"></main>

<footer>
  <span>© 2026 Saigon Purple by Harry — veinclusive purple selection.</span>
  <span><a href="https://www.instagram.com/purplebyhry/" target="_blank" rel="noopener">Instagram</a> · <a href="https://www.tiktok.com/@purplebyhry" target="_blank" rel="noopener">TikTok</a></span>
</footer>

<div class="reader" id="reader"><button class="rd-close" id="rdClose" aria-label="Close">✕</button><div id="rdContent"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<script>
(function(){
  var FALLBACK=[
    {slug:'welcome-to-purple',title:'Welcome to the Purple Room',date:'2026-06-20',cover:'images/about-room.jpg',excerpt:'How one velvet leaf turned into a climate-controlled atelier of rare anthurium in the heart of Saigon.',body:'It started with a single **Carlablackiae** leaf.\n\nWhat began as a windowsill obsession is now a climate-controlled room held at 26°C and 70–85% humidity, where the rarest aroids are grown like living jewellery.\n\nIn this journal I will share grow notes, new unfurls, restocks and the stories behind each specimen.'},
    {slug:'caring-for-carlablackiae',title:'Caring for Carlablackiae',date:'2026-06-26',cover:'images/Carlablackiae1.jpg',excerpt:'Velvet, bullate and notoriously fussy — the exact envelope that keeps Carla pushing perfect hearts.',body:'Carlablackiae rewards consistency.\n\n- **Light:** bright indirect, ~120 µmol PAR\n- **Humidity:** 70–85% RH\n- **Medium:** chunky, airy aroid mix\n- **Temp:** steady 24–26°C\n\nSlow, stable conditions give you the quilted velvet and silver veins collectors chase for a decade.'}
  ];
  var grid=document.getElementById('grid'),reader=document.getElementById('reader'),rd=document.getElementById('rdContent');
  function fmt(d){try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;}}
  function md(t){return (window.marked?marked.parse(t||''):'<p>'+(t||'').replace(/\n/g,'<br>')+'</p>');}
  function render(posts){
    grid.innerHTML='';
    posts.forEach(function(p){
      var c=document.createElement('article');c.className='post';
      c.innerHTML='<div class="ph"><img src="'+(function(c){return c.charAt(0)==='/'?c.slice(1):c;})(p.cover||'images/about-room.jpg')+'" alt="" loading="lazy"></div>'+
        '<div class="body"><div class="d">'+fmt(p.date)+'</div><div class="t">'+p.title+'</div>'+
        '<div class="ex">'+(p.excerpt||'')+'</div><div class="more pink">Read →</div></div>';
      c.onclick=function(){open(p);};
      grid.appendChild(c);
    });
    var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
    grid.querySelectorAll('.post').forEach(function(c){io.observe(c);});
  }
  function open(p){
    rd.innerHTML='<div class="rd-cover"><img src="'+(function(c){return c.charAt(0)==='/'?c.slice(1):c;})(p.cover||'images/about-room.jpg')+'" alt=""></div>'+
      '<div class="rd-body"><div class="d">'+fmt(p.date)+'</div><h1>'+p.title+'</h1><div class="rt">'+md(p.body)+'</div></div>';
    reader.classList.add('open');document.body.style.overflow='hidden';location.hash='post='+p.slug;
  }
  function close(){reader.classList.remove('open');document.body.style.overflow='';if(location.hash.indexOf('post=')>-1)history.replaceState(null,'',location.pathname);}
  document.getElementById('rdClose').onclick=close;
  addEventListener('keydown',function(e){if(e.key==='Escape')close();});
  var POSTS=FALLBACK;
  function boot(){render(POSTS);var h=location.hash.match(/post=([\w-]+)/);if(h){var p=POSTS.filter(function(x){return x.slug===h[1];})[0];if(p)open(p);}}
  var LOCALP=[];
  fetch('content/posts.json',{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(d){if(d&&d.posts&&d.posts.length){POSTS=d.posts.slice().reverse();LOCALP=POSTS;}}).catch(function(){}).then(function(){
    boot();
    if(window.sanityFetch){
      sanityFetch(SQ.posts).then(function(items){
        if(!items||!items.length)return;
        var byS={};LOCALP.forEach(function(p){byS[p.slug]=p;});
        POSTS=items.map(function(p){var loc=byS[p.slug]||{};return {title:p.title,slug:p.slug,date:p.date,excerpt:p.excerpt,body:p.body,cover:p.cover?sImg(p.cover,'w=1200&q=82&auto=format'):(loc.cover||'')};});
        render(POSTS);
      });
    }
  });
})();
</script>
<script src="assets/loader.js"></script>
</body>
</html>
