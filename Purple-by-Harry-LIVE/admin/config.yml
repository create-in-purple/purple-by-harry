backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

site_url: https://saigonpurple.com
display_url: https://saigonpurple.com
logo_url: https://saigonpurple.com/images/about-portrait.jpg

collections:
  # ---------- HOME & BRAND IMAGES ----------
  - name: "home"
    label: "🏠 Home & Brand images"
    files:
      - name: "site"
        label: "Home / brand images"
        file: "content/site.json"
        description: "Replace any image on the homepage. Click a field, upload from your computer, then Publish."
        fields:
          - { label: "Logo (dark background, transparent PNG)", name: "logo", widget: "image" }
          - { label: "Nav logo (horizontal mark)", name: "logoMark", widget: "image" }
          - label: "About — photos"
            name: "about"
            widget: "object"
            fields:
              - { label: "Portrait of Harry", name: "portrait", widget: "image" }
              - { label: "Grow room", name: "room", widget: "image" }
              - { label: "Harry & cats", name: "cats", widget: "image" }
          - label: "Instagram showcase (3 square photos)"
            name: "instagram"
            widget: "list"
            field: { label: "Photo", name: "photo", widget: "image" }
          - label: "Collection — variety photos (first photo = main image)"
            name: "varieties"
            widget: "object"
            fields:
              - { label: "Carlablackiae (up to 5)", name: "carla", widget: "list", field: { label: "Photo", name: "photo", widget: "image" } }
              - { label: "Stripey (up to 5)", name: "stripey", widget: "list", field: { label: "Photo", name: "photo", widget: "image" } }
              - { label: "Red Crystallinum (up to 5)", name: "crystal", widget: "list", field: { label: "Photo", name: "photo", widget: "image" } }

  # ---------- SHOP ----------
  - name: "shop"
    label: "🛒 Shop — Products & stock"
    files:
      - name: "catalog"
        label: "Product catalog"
        file: "content/products.json"
        description: "Add, edit, reorder products. Set Stock to 0 to mark Sold out."
        fields:
          - { label: "Currency symbol", name: "currency", widget: "string", default: "$" }
          - label: "Products"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} — {{fields.cat}} ({{fields.stock}} in stock)"
            fields:
              - { label: "Unique ID (no spaces)", name: "id", widget: "string", hint: "e.g. carla-ps — must be unique" }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Subtitle / Latin", name: "lat", widget: "string", required: false }
              - { label: "Category", name: "cat", widget: "select", options: ["Pure Species","Exact Plant Selections","Cutting and Offset","Seeds","Hybrids"] }
              - { label: "Tags", name: "tags", widget: "list", required: false, hint: "e.g. Velvet, Limited" }
              - { label: "Price", name: "price", widget: "number", value_type: "int" }
              - { label: "Stock", name: "stock", widget: "number", value_type: "int", default: 1, hint: "0 = Sold out" }
              - { label: "Photo", name: "img", widget: "image" }

  # ---------- THE VAULT ----------
  - name: "vault"
    label: "🖼 The Vault (gallery)"
    files:
      - name: "gallery"
        label: "Vault gallery"
        file: "content/vault.json"
        description: "Upload / replace / delete & drag-reorder. Set Size = Tall or Wide to feature a photo as a bigger tile."
        fields:
          - { label: "Max photos shown", name: "max", widget: "number", value_type: "int", default: 18, hint: "Keeps the wall tidy — extra photos beyond this aren't shown." }
          - label: "Photos"
            name: "images"
            widget: "list"
            max: 24
            summary: "{{fields.size}}"
            fields:
              - { label: "Photo", name: "img", widget: "image" }
              - { label: "Size (featured)", name: "size", widget: "select", options: ["normal","tall","wide"], default: "normal" }

  # ---------- GROWER'S GUIDE ----------
  - name: "guide"
    label: "🌱 Grower's Guide"
    files:
      - name: "guide"
        label: "Guide content"
        file: "content/guide.json"
        description: "Edit the care guide. Add / reorder sections; each section has its own heading and rich-text body."
        fields:
          - { label: "Intro line", name: "intro", widget: "text" }
          - label: "Sections"
            name: "sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Anchor id (no spaces)", name: "id", widget: "string", hint: "e.g. watering" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Body", name: "body", widget: "markdown" }

  # ---------- BLOG ----------
  - name: "blog"
    label: "✍️ Blog"
    files:
      - name: "posts"
        label: "Blog posts"
        file: "content/posts.json"
        description: "Write and edit journal posts. Newest first."
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Slug (URL, no spaces)", name: "slug", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Cover photo", name: "cover", widget: "image", required: false }
              - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
              - { label: "Body", name: "body", widget: "markdown" }
